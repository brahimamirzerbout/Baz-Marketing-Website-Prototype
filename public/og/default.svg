    <text x="0" y="244" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#5b5b57">Performance · Creative · Social · PR · Events · Email · SEO · B2B</text>
    <text x="0" y="274" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#5b5b57">Research · Web · Analytics · AI · Lifecycle · Branding · Strategy</text>
