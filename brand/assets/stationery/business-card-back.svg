<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 600" width="1050" height="600">
  <!-- BAZ Business Card Back — 1050×600 @ 300dpi -->
  <!-- Ink background, large centered mark -->
  <rect width="1050" height="600" rx="13" fill="#0e0e0e"/>

  <!-- Large centered mark -->
  <g transform="translate(445, 230)">
    <rect x="0" y="0" width="160" height="160" rx="35" fill="#8b5cf6"/>
    <text x="80" y="122" font-family="Fraunces, Georgia, serif" font-size="124" font-weight="600" fill="#f5f1ea" text-anchor="middle" letter-spacing="-4">B</text>
  </g>

  <!-- Tagline -->
  <text x="525" y="460" font-family="JetBrains Mono, monospace" font-size="9" font-weight="400" fill="#525252" letter-spacing="2.5" text-anchor="middle" text-transform="uppercase">POWERING YOUR PATH TO GROWTH</text>
</svg>