<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200" font-family="Inter, system-ui, sans-serif">
  <!-- LinkedIn carousel slide 02: the pattern -->
  <rect width="1200" height="1200" fill="#faf7f2"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="6" fill="#8a8a8a"/>

  <!-- Slide number -->
  <g transform="translate(80, 80)">
    <text font-family="JetBrains Mono, monospace" font-size="12" letter-spacing="3" fill="#0e0e10" opacity="0.5">02 / 05</text>
  </g>

  <!-- Title -->
  <g transform="translate(80, 160)">
    <text font-family="Fraunces, Georgia, serif" font-size="80" font-weight="500" fill="#0e0e10" letter-spacing="-3" y="0">The pattern.</text>
  </g>

  <!-- Timeline -->
  <g transform="translate(80, 320)">
    <line x1="0" y1="0" x2="0" y2="800" stroke="#0e0e10" stroke-opacity="0.15" stroke-width="2"/>
  </g>

  <g transform="translate(80, 360)">
    <circle cx="0" cy="0" r="10" fill="#8a8a8a"/>
    <text x="40" y="-12" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="2" fill="#0e0e10" opacity="0.5">MONTH 0</text>
    <text x="40" y="14" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="#0e0e10">Client signs retainer. Agency promises the world.</text>
  </g>

  <g transform="translate(80, 480)">
    <circle cx="0" cy="0" r="10" fill="#0e0e10" opacity="0.5"/>
    <text x="40" y="-12" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="2" fill="#0e0e10" opacity="0.5">MONTH 3</text>
    <text x="40" y="14" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="#0e0e10">Agency delivers 60% of the world.</text>
  </g>

  <g transform="translate(80, 600)">
    <circle cx="0" cy="0" r="10" fill="#0e0e10" opacity="0.5"/>
    <text x="40" y="-12" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="2" fill="#0e0e10" opacity="0.5">MONTH 8</text>
    <text x="40" y="14" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="#0e0e10">Client fires agency. Signs replacement.</text>
  </g>

  <g transform="translate(80, 720)">
    <circle cx="0" cy="0" r="10" fill="#0e0e10" opacity="0.5"/>
    <text x="40" y="-12" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="2" fill="#0e0e10" opacity="0.5">MONTH 12</text>
    <text x="40" y="14" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="#0e0e10">Replacement delivers 50% of the world.</text>
  </g>

  <g transform="translate(80, 840)">
    <circle cx="0" cy="0" r="10" fill="#0e0e10" opacity="0.3"/>
    <text x="40" y="-12" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="2" fill="#0e0e10" opacity="0.5">MONTH 18</text>
    <text x="40" y="14" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="#0e0e10" opacity="0.7">Client gives up on agencies entirely.</text>
  </g>

  <!-- Footer -->
  <g transform="translate(80, 1100)">
    <text font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2" fill="#0e0e10" opacity="0.5">BAZ · THE AGENCY CHURN EQUATION</text>
  </g>
</svg>