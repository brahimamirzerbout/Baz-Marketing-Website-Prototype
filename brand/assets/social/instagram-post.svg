<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <!-- BAZ Instagram Post — 1080×1080 -->
  <!-- Paper background, centered wordmark, 35% padding, editorial style -->
  <defs>
    <linearGradient id="ig-mesh" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#f5f1ea" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Paper background -->
  <rect width="1080" height="1080" fill="#f5f1ea"/>
  <rect width="1080" height="1080" fill="url(#ig-mesh)"/>

  <!-- Grid pattern -->
  <g opacity="0.03">
    <line x1="80" y1="0" x2="80" y2="1080" stroke="#0e0e0e" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="1080" stroke="#0e0e0e" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="1080" stroke="#0e0e0e" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="1080" stroke="#0e0e0e" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="1080" stroke="#0e0e0e" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="1080" stroke="#0e0e0e" stroke-width="0.5"/>
    <line x1="560" y1="0" x2="560" y2="1080" stroke="#0e0e0e" stroke-width="0.5"/>
    <line x1="640" y1="0" x2="640" y2="1080" stroke="#0e0e0e" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="1080" stroke="#0e0e0e" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="1080" stroke="#0e0e0e" stroke-width="0.5"/>
    <line x1="880" y1="0" x2="880" y2="1080" stroke="#0e0e0e" stroke-width="0.5"/>
    <line x1="960" y1="0" x2="960" y2="1080" stroke="#0e0e0e" stroke-width="0.5"/>
    <line x1="1040" y1="0" x2="1040" y2="1080" stroke="#0e0e0e" stroke-width="0.5"/>
  </g>

  <!-- Content area — centered with generous padding (35%) -->
  <!-- Eyebrow -->
  <text x="540" y="380" font-family="JetBrains Mono, monospace" font-size="13" font-weight="400" fill="#8b5cf6" letter-spacing="2.5" text-anchor="middle" text-transform="uppercase">● BRAND &amp; IDENTITY</text>

  <!-- Headline -->
  <text x="540" y="480" font-family="Fraunces, Georgia, serif" font-size="72" font-weight="300" fill="#0e0e0e" letter-spacing="-3" text-anchor="middle">Brand &amp; Buzz.</text>

  <!-- Supporting text -->
  <text x="540" y="540" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="400" fill="#525252" text-anchor="middle">We make brands unignorable.</text>

  <!-- Violet accent line -->
  <rect x="470" y="580" width="140" height="2" fill="#8b5cf6" rx="1"/>

  <!-- Mark — bottom center -->
  <g transform="translate(500, 700)">
    <rect x="0" y="0" width="80" height="80" rx="18" fill="#8b5cf6"/>
    <text x="40" y="60" font-family="Fraunces, Georgia, serif" font-size="62" font-weight="600" fill="#f5f1ea" text-anchor="middle" letter-spacing="-2">B</text>
  </g>

  <!-- URL -->
  <text x="540" y="830" font-family="JetBrains Mono, monospace" font-size="11" font-weight="400" fill="#a3a3a3" letter-spacing="1.5" text-anchor="middle">BAZAGENCY.COM</text>
</svg>