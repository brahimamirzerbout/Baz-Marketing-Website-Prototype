<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e0e10"/>
      <stop offset="100%" stop-color="#18181a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8a8a8a"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#faf7f2" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="6" fill="url(#accent)"/>

  <!-- BAZ mark + label -->
  <g transform="translate(72, 64)">
    <rect width="56" height="56" rx="12" fill="#8a8a8a"/>
    <text x="28" y="42" font-family="Fraunces, Georgia, serif" font-size="40" font-weight="600" fill="#faf7f2" text-anchor="middle" letter-spacing="-1.5">B</text>
    <text x="76" y="36" font-family="Fraunces, Georgia, serif" font-size="22" font-weight="500" fill="#faf7f2" letter-spacing="-0.02em">BAZ</text>
    <text x="76" y="52" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="2" fill="#faf7f2" opacity="0.6">MARKETING AGENCY</text>
  </g>

  <!-- Eyebrow -->
  <g transform="translate(72, 220)">
    <rect width="200" height="32" rx="16" fill="rgba(255, 59, 47, 0.18)"/>
    <text x="100" y="20" font-family="JetBrains Mono, monospace" font-size="12" letter-spacing="2" fill="#8a8a8a" text-anchor="middle">Q3 — 2 SPOTS LEFT</text>
  </g>

  <!-- Headline -->
  <g transform="translate(72, 280)">
    <text font-family="Fraunces, Georgia, serif" font-size="84" font-weight="500" fill="#faf7f2" letter-spacing="-3" y="0">Add</text>
    <text font-family="Fraunces, Georgia, serif" font-size="84" font-weight="500" fill="url(#accent)" letter-spacing="-3" y="80">$200K+</text>
    <text font-family="Fraunces, Georgia, serif" font-size="84" font-weight="500" fill="#faf7f2" letter-spacing="-3" y="160">to pipeline in 90 days.</text>
  </g>

  <!-- Subhead -->
  <g transform="translate(72, 500)">
    <text font-family="Inter, sans-serif" font-size="22" fill="#faf7f2" opacity="0.7">Or pay nothing for month four. Senior-only. No juniors.</text>
  </g>

  <!-- Footer -->
  <g transform="translate(72, 580)">
    <text font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="2" fill="#faf7f2" opacity="0.5">BAZ · 240+ ENGAGEMENTS · 14 SENIOR PARTNERS</text>
  </g>
</svg>