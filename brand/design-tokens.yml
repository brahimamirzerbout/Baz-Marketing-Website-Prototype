# BAZ Design Tokens — YAML Format
# Single source of truth for all design values
# BlackSwan Design System × Fibonacci × Da Vinci × Material 3

seed:
  hue: 270          # Violet — the BAZ accent
  saturation: 85%    # High saturation for brand vibrancy (Æther spec)
  lightness: 50%     # Balanced lightness

colors:
  ink:
    900: "#0e0e0e"
    800: "#1a1a1a"
    600: "#525252"
    500: "#737373"
    400: "#a3a3a3"

  paper:
    default: "#f5f1ea"
    50: "#faf7f1"
    100: "#f0ebe0"
    200: "#e0d8cc"
    300: "#c9bfb0"

  accent:
    default: "hsl(270, 85%, 72%)"
    50: "hsl(270, 100%, 97%)"
    100: "hsl(270, 100%, 94%)"
    200: "hsl(270, 100%, 88%)"
    300: "hsl(270, 100%, 81%)"
    400: "hsl(270, 85%, 76%)"
    500: "hsl(270, 85%, 72%)"
    600: "hsl(270, 80%, 64%)"
    700: "hsl(270, 75%, 55%)"
    800: "hsl(270, 70%, 42%)"
    900: "hsl(270, 65%, 35%)"
    gold: "#a0a0a0"
    red: "#8a8a8a"

  violet:
    50: "#f5f0ff"
    100: "#ebe3ff"
    200: "#d5c7ff"
    300: "#baabff"
    400: "#9985ff"
    500: "#8b5cf6"
    600: "#7c3aed"
    700: "#6d28d9"
    800: "#5b21b6"
    900: "#4c1d95"

  semantic:
    success: "hsl(152, 68%, 38%)"
    warning: "hsl(38, 92%, 45%)"
    danger: "hsl(0, 78%, 50%)"
    info: "hsl(270, 85%, 72%)"

typography:
  fontFamilies:
    display: "'Fraunces', 'Iowan Old Style', 'Noto Serif', Georgia, serif"
    sans: "'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    mono: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace"

  fontSizes:
    2xs: "0.512rem"     # ~8px
    xs: "0.64rem"        # ~10px
    sm: "0.8rem"         # ~13px
    base: "1rem"          # 16px
    md: "1.25rem"         # ~20px
    lg: "1.563rem"        # ~25px
    xl: "1.953rem"        # ~31px
    2xl: "2.441rem"       # ~39px
    3xl: "3.052rem"       # ~49px
    4xl: "3.815rem"       # ~61px
    display-m: "2rem"     # 32px
    display-l: "3rem"     # 48px
    display-xl: "4.5rem"  # 72px
    display: "6rem"       # 96px

  fontWeights:
    light: 300
    regular: 400
    medium: 500
    semiBold: 600
    bold: 700
    extraBold: 800
    black: 900

  lineHeights:
    none: 1
    tight: 1.15
    snug: 1.3
    normal: 1.55
    relaxed: 1.7

  letterSpacings:
    tighter: "-0.04em"
    tight: "-0.02em"
    normal: "0"
    wide: "0.03em"
    wider: "0.06em"
    widest: "0.1em"
    eyebrow: "0.18em"

  ratio: 1.25  # Major Third

spacing:
  0: "0"
  px: "0.0625rem"
  0-5: "0.125rem"
  1: "0.25rem"
  1-5: "0.375rem"
  2: "0.5rem"
  2-5: "0.625rem"
  3: "0.75rem"
  3-5: "0.875rem"
  4: "1rem"
  5: "1.25rem"
  6: "1.5rem"
  7: "1.75rem"
  8: "2rem"
  9: "2.25rem"
  10: "2.5rem"
  12: "3rem"
  14: "3.5rem"
  16: "4rem"
  20: "5rem"
  24: "6rem"
  28: "7rem"
  32: "8rem"
  36: "9rem"
  40: "10rem"
  48: "12rem"
  56: "14rem"
  64: "16rem"

radius:
  # Fibonacci scale (primary)
  none: "0"
  fib3: "3px"
  fib5: "5px"
  fib8: "8px"
  fib13: "13px"
  fib21: "21px"
  fib34: "34px"
  fib55: "55px"
  fib89: "89px"
  full: "9999px"
  # BlackSwan base scale (secondary)
  xs: "0.125rem"
  sm: "0.25rem"
  md: "0.5rem"
  lg: "0.75rem"
  xl: "1rem"
  2xl: "1.5rem"
  3xl: "2rem"

shadows:
  none: "none"
  xs: "0 1px 2px 0 rgba(0,0,0,0.03)"
  sm: "0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06)"
  md: "0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05)"
  lg: "0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04)"
  xl: "0 20px 25px -5px rgba(0,0,0,0.10), 0 8px 10px -6px rgba(0,0,0,0.04)"
  2xl: "0 25px 50px -12px rgba(0,0,0,0.16)"
  inner: "inset 0 2px 4px 0 rgba(0,0,0,0.04)"

motion:
  durations:
    instant: "75ms"
    fast: "150ms"
    normal: "250ms"
    slow: "400ms"
    glacial: "600ms"
  easings:
    default: "cubic-bezier(0.2, 0, 0, 1)"
    in: "cubic-bezier(0.4, 0, 1, 1)"
    out: "cubic-bezier(0, 0, 0.2, 1)"
    inOut: "cubic-bezier(0.4, 0, 0.2, 1)"
    bounce: "cubic-bezier(0.34, 1.56, 0.64, 1)"
    elastic: "cubic-bezier(0.68, -0.55, 0.27, 1.55)"

opacity:
  0: "0"
  5: "0.05"
  10: "0.1"
  20: "0.2"
  25: "0.25"
  30: "0.3"
  40: "0.4"
  50: "0.5"
  60: "0.6"
  70: "0.7"
  75: "0.75"
  80: "0.8"
  90: "0.9"
  95: "0.95"
  100: "1"

zIndex:
  below: -1
  base: 0
  above: 1
  dropdown: 100
  sticky: 200
  overlay: 300
  modal: 400
  popover: 500
  toast: 600

breakpoints:
  sm: "640px"
  md: "768px"
  lg: "1024px"
  xl: "1280px"
  2xl: "1536px"

containers:
  sm: "36rem"
  md: "48rem"
  lg: "60rem"
  xl: "72rem"
  2xl: "84rem"