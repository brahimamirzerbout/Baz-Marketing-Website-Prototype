  </g>

  <g transform="translate(48, 280)">
    <text font-family="Inter, sans-serif" font-size="16" fill="#faf7f2" opacity="0.7">Paid social, paid search, programmatic, and CRO. Server-side attribution, weekly creative, monthly forecast.</text>
  </g>

  <line x1="48" y1="380" x2="552" y2="380" stroke="#faf7f2" stroke-opacity="0.15"/>

  <g transform="translate(48, 420)">
    <text font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2" fill="#faf7f2" opacity="0.5">PROOF</text>
  </g>

  <g transform="translate(48, 450)">
    <text font-family="Fraunces, serif" font-size="40" font-weight="500" fill="#8a8a8a" letter-spacing="-1">1.8 → 4.6</text>
