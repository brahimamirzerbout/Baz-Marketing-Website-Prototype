<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" width="300" height="100">
  <!-- BAZ Violet Shimmer — For borders, decorative dividers -->
  <defs>
    <linearGradient id="violet-shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="300" height="100" fill="url(#violet-shimmer)"/>
</svg>