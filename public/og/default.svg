      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#0e0e10" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <radialGradient id="m" cx="85%" cy="15%" r="80%">
      <stop offset="0%" stop-color="#ff3b2f" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#faf7f2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bmark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff3b2f"/>
      <stop offset="100%" stop-color="#e0281c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#faf7f2"/>
  <rect width="1200" height="630" fill="url(#g)"/>
  <rect width="1200" height="630" fill="url(#m)"/>

  <!-- Logo lockup (top-left) -->
  <g transform="translate(80,80)">
