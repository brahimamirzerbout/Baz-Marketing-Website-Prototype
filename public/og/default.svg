    <text x="32" y="46" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#fff" text-anchor="middle">B</text>
    <text x="84" y="46" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#0e0e10" letter-spacing="-1">AZ</text>
